[platformio]
default_envs = f446re_rework
; We keep the repo layout; compile only what we include in src_filter
src_dir = .
include_dir = Inc

[env:f446re_rework]
platform = ststm32
framework = stm32cube

; Use a known manifest with same MCU to get correct linker/startup defaults
; (we can switch to a custom board JSON later)
board = nucleo_f446re

; ST-LINK upload/debug (macOS: no driver required)
upload_protocol = stlink
debug_tool = stlink

; IMPORTANT: use the project's existing stm32f4xx_hal_conf.h instead of PIO template
board_build.stm32cube.custom_config_header = yes

; Compile flags + include paths for repo layout
build_flags =
  -DUSE_HAL_DRIVER
  -DSTM32F446xx
  -IInc
  -ITFT
  -IFatFS
  -ISD_SPI
  -IW25Qxx
  -IJSON_PARSER
  ;${env.build_flags}
  ;-Wl,-Map,$BUILD_DIR/firmware.map
; Only compile these folders (avoid accidentally compiling data/assets)
build_src_filter =
  +<Src/>
  +<TFT/>
  +<FatFS/>
  +<SD_SPI/>
  +<W25Qxx/>
  +<JSON_PARSER/>
  -<NLS/>
  ; Avoid duplicate system init: PlatformIO already supplies CMSIS system/startup for the board
  -<Src/system_stm32f4xx.c>

build_type = release
extra_scripts = post:gen_hex.py
